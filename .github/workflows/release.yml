name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${{ steps.tag.outputs.tag }}$" | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}".."${{ steps.tag.outputs.tag }}" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log "${{ steps.tag.outputs.tag }}" --pretty=format:"- %s" --no-merges)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          mkdir -p staging/Plater
          rsync -av --exclude='.git' --exclude='.github' --exclude='.idea' --exclude='.gitignore' . staging/Plater/
          cd staging
          zip -r "../Plater.zip" Plater/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            --latest \
            "Plater.zip"
